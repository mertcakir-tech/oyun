<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oyun Skor Tablosu</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #eeede8;
  --text-primary: #1a1a18; --text-secondary: #6b6b67;
  --border-light: rgba(0,0,0,0.10); --border-medium: rgba(0,0,0,0.18);
  --radius-md: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1c1c1a; --bg-secondary: #262624; --bg-tertiary: #2e2e2c;
    --text-primary: #f0efe8; --text-secondary: #8a8a84;
    --border-light: rgba(255,255,255,0.08); --border-medium: rgba(255,255,255,0.15);
  }
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; padding: 1.5rem 1rem 3rem; }
.app { max-width: 960px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 1.5rem; }
.header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 4px; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
.header p { font-size: 11px; color: var(--text-secondary); letter-spacing: 2px; text-transform: uppercase; }
.info-bar { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.info-card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex: 1 1 160px; }
.info-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
.info-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 1px; color: var(--text-primary); line-height: 1; }
.info-val-sm { font-size: 0.9rem; font-family: 'DM Sans', sans-serif; font-weight: 500; }
.info-edit-btn { font-size: 11px; border: 0.5px solid var(--border-medium); background: var(--bg-secondary); color: var(--text-primary); border-radius: var(--radius-md); padding: 3px 8px; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-left: auto; flex-shrink: 0; }
.info-edit-btn:hover { background: var(--bg-tertiary); }
.set-board { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 1.25rem; }
.set-board-title { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
.set-scores { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
.set-player { display: flex; flex-direction: column; gap: 1px; }
.set-name { font-size: 11px; color: var(--text-secondary); }
.set-count { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--text-primary); line-height: 1; }
.set-sep { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--text-secondary); align-self: center; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.round-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
.round-modal.open { display: flex; }
.modal-box { background: var(--bg-primary); border: 0.5px solid var(--border-medium); border-radius: var(--radius-lg); padding: 22px 24px; min-width: 280px; max-width: 380px; width: 92vw; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 14px; }
.modal-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.modal-row label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
.modal-input { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-primary); border: 0.5px solid var(--border-medium); background: var(--bg-secondary); border-radius: var(--radius-md); padding: 7px 10px; width: 100%; outline: none; }
.modal-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; padding: 4px 0; user-select: none; }
.modal-toggle input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #1D9E75; }
.modal-btns { display: flex; gap: 8px; margin-top: 4px; }
.modal-save { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 14px; border-radius: var(--radius-md); border: none; background: #1D9E75; color: #fff; cursor: pointer; }
.modal-save:hover { background: #178a64; }
.modal-cancel { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border-medium); background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; }
.modal-cancel:hover { background: var(--bg-tertiary); }
.round-box { background: var(--bg-primary); border: 0.5px solid var(--border-medium); border-radius: var(--radius-lg); padding: 28px 24px 22px; max-width: 380px; width: 92vw; text-align: center; }
.round-trophy { font-size: 3rem; margin-bottom: 8px; }
.round-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; margin-bottom: 8px; }
.round-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.6; }
.round-toggle { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); cursor: pointer; justify-content: center; margin-bottom: 16px; user-select: none; }
.round-toggle input { accent-color: #1D9E75; }
.round-opts { display: flex; flex-direction: column; gap: 8px; }
.round-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 10px 18px; border-radius: var(--radius-md); cursor: pointer; display: flex; align-items: center; gap: 8px; }
.round-btn.primary { background: #1D9E75; color: #fff; border: none; }
.round-btn.primary:hover { background: #178a64; }
.round-btn.secondary { background: var(--bg-secondary); color: var(--text-primary); border: 0.5px solid var(--border-medium); }
.round-btn.secondary:hover { background: var(--bg-tertiary); }
.controls { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; border-radius: var(--radius-md); border: 0.5px solid var(--border-medium); background: var(--bg-primary); color: var(--text-primary); }
.add-btn:hover { background: var(--bg-secondary); }
.reset-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; border-radius: var(--radius-md); border: 0.5px solid #E24B4A; background: transparent; color: #E24B4A; }
.reset-btn:hover { background: #FCEBEB; }
.players-grid { display: flex; gap: 12px; flex-wrap: wrap; }
.player-card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 16px 16px 14px; flex: 1 1 200px; min-width: 0; display: flex; flex-direction: column; gap: 11px; }
.player-card.finished { border: 1.5px solid #1D9E75; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
.player-name-input { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; color: var(--text-primary); border: none; background: transparent; outline: none; width: 100%; min-width: 0; padding: 0; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); opacity: 0.35; padding: 2px; border-radius: 4px; display: inline-flex; align-items: center; font-size: 15px; flex-shrink: 0; }
.del-btn:hover { opacity: 1; color: #E24B4A; }
.set-badge { font-size: 11px; font-weight: 500; background: #FEF3C7; color: #78350F; border-radius: 20px; padding: 2px 8px; display: inline-block; }
.total-row { display: flex; flex-direction: column; gap: 2px; }
.total-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.2px; }
.total-score { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 1px; color: var(--text-primary); line-height: 1; }
.progress-wrap { display: flex; flex-direction: column; gap: 5px; }
.progress-bg { height: 5px; background: var(--bg-secondary); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; background: #EF9F27; transition: width 0.35s ease; }
.progress-fill.high { background: #1D9E75; }
.need-label { font-size: 12px; color: var(--text-secondary); }
.need-label strong { font-weight: 500; color: var(--text-primary); }
.done-badge { font-size: 11px; color: #085041; background: #E1F5EE; border-radius: 20px; padding: 2px 9px; display: inline-block; font-weight: 500; }
.history-chips { display: flex; flex-wrap: wrap; gap: 3px; min-height: 18px; }
.chip { font-size: 11px; padding: 2px 7px; border-radius: 20px; background: var(--bg-secondary); border: 0.5px solid var(--border-light); color: var(--text-secondary); }
.score-row { display: flex; gap: 6px; align-items: center; }
.score-inp { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-primary); border: 0.5px solid var(--border-light); background: var(--bg-secondary); border-radius: var(--radius-md); padding: 6px 8px; width: 0; flex: 1; text-align: center; outline: none; min-width: 0; }
.score-inp:focus { border-color: var(--border-medium); background: var(--bg-primary); }
.add-score-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 6px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-medium); background: var(--bg-primary); color: var(--text-primary); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.add-score-btn:hover { background: var(--bg-secondary); }
.add-score-btn:active { transform: scale(0.97); }
.img-separator { width: 100%; display: flex; justify-content: center; padding: 0.75rem 0; }
.img-separator img { border: 0.5px solid var(--border-light); max-width: 100%; max-height: 320px; object-fit: contain; border-radius: 10px; display: block; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); font-size: 14px; border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); background: var(--bg-primary); }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(70px); background: var(--bg-primary); border: 0.5px solid var(--border-medium); border-radius: var(--radius-md); padding: 9px 20px; font-size: 13px; color: var(--text-primary); transition: transform 0.25s ease; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>&#127942; Skor Tablosu</h1>
    <p>Puan Takip Sistemi</p>
  </div>

  <div class="info-bar">
    <div class="info-card">
      <i class="ti ti-flag" style="font-size:18px;color:var(--text-secondary);flex-shrink:0"></i>
      <div style="display:flex;flex-direction:column;gap:1px">
        <span class="info-label">Hedef Puan</span>
        <span class="info-val" id="target-display">8.000</span>
      </div>
      <button class="info-edit-btn" onclick="openSettingsModal()">&#9881; Ayarlar</button>
    </div>
    <div class="info-card">
      <i class="ti ti-refresh" style="font-size:18px;color:var(--text-secondary);flex-shrink:0"></i>
      <div style="display:flex;flex-direction:column;gap:1px">
        <span class="info-label">Set Sonunda</span>
        <span class="info-val info-val-sm" id="reset-mode-label">Tumunu Sifirla</span>
      </div>
    </div>
  </div>

  <div class="set-board">
    <div class="set-board-title">&#127942; Set Skoru &mdash; otomatik veya manuel</div>
    <div class="set-scores" id="set-scores-row"></div>
  </div>

  <div class="controls">
    <button class="add-btn" onclick="addPlayer()"><i class="ti ti-user-plus"></i> Oyuncu Ekle</button>
    <button class="reset-btn" onclick="resetAllScores()"><i class="ti ti-refresh"></i> Puanlari Sifirla</button>
    <button class="add-btn" onclick="openManualSetModal()"><i class="ti ti-edit"></i> Set Skoru Gir</button>
  </div>

  <div class="players-grid" id="players-grid"></div>
  <div id="empty" class="empty-state" style="display:none">
    <i class="ti ti-users" style="font-size:36px;display:block;margin-bottom:10px;opacity:0.25"></i>
    Oyuncu ekleyerek baslayin
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal-box">
    <div class="modal-title">&#9881; Ayarlar</div>
    <div class="modal-row">
      <label>Hedef Puan</label>
      <input class="modal-input" type="number" id="s-target" value="8000" min="1">
    </div>
    <div class="modal-row">
      <label>Set Sonunda Puan Yonetimi</label>
      <label class="modal-toggle">
        <input type="checkbox" id="s-reset-all" checked>
        Tum puanlari sifirla (isaretli = sifirla)
      </label>
      <label class="modal-toggle" style="margin-top:6px">
        <input type="checkbox" id="s-auto-mode">
        Otomatik: 2 oyuncuda sifirla, 3+ oyuncuda koru
      </label>
    </div>
    <div class="modal-btns">
      <button class="modal-save" onclick="saveSettings()">Kaydet</button>
      <button class="modal-cancel" onclick="closeModal('settings-modal')">Iptal</button>
    </div>
  </div>
</div>

<!-- Manual Set Modal -->
<div class="modal-overlay" id="set-modal">
  <div class="modal-box">
    <div class="modal-title">&#127885; Set Skoru Duzenle</div>
    <div id="set-manual-rows"></div>
    <div class="modal-btns">
      <button class="modal-save" onclick="saveManualSets()">Kaydet</button>
      <button class="modal-cancel" onclick="closeModal('set-modal')">Iptal</button>
    </div>
  </div>
</div>

<!-- Round Complete Modal -->
<div class="round-modal" id="round-modal">
  <div class="round-box">
    <div class="round-trophy">&#127942;</div>
    <div class="round-title" id="round-title">Set Bitti!</div>
    <div class="round-sub" id="round-sub"></div>
    <label class="round-toggle">
      <input type="checkbox" id="round-reset-override">
      Ayari bu set icin tersine cevir
    </label>
    <div class="round-opts">
      <button class="round-btn primary" onclick="nextRound()"><i class="ti ti-arrow-right"></i> Yeni Sete Basla</button>
      <button class="round-btn secondary" onclick="keepAndClose()"><i class="ti ti-x"></i> Kapat (ayni puanlarla devam)</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

  var TARGET = 8000;
  var resetAllOnSet = true;
  var autoResetMode = false;
  var roundModalOpen = false;

  var players = [
    { id: 1, name: 'Oyuncu 1', scores: [], sets: 0 },
    { id: 2, name: 'Oyuncu 2', scores: [], sets: 0 }
  ];
  var nextId = 3;
  var toastTimer = null;

  function total(p) {
    return p.scores.reduce(function(a, b) { return a + b; }, 0);
  }

  function effectiveReset() {
    if (autoResetMode) return players.length <= 2;
    return resetAllOnSet;
  }

  function updateInfoBar() {
    document.getElementById('reset-mode-label').textContent = effectiveReset() ? 'Tümünü Sıfırla' : 'Puanları Koru';
    document.getElementById('target-display').textContent = TARGET.toLocaleString('tr-TR');
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function buildCard(p) {
    var tot = total(p);
    var left = Math.max(0, TARGET - tot);
    var pct = Math.min(100, Math.round((tot / TARGET) * 100));
    var done = tot >= TARGET;
    var chips = p.scores.slice(-5).map(function(s) {
      return '<span class="chip">' + (s > 0 ? '+' : '') + s + '</span>';
    }).join('');
    var fillCls = pct >= 60 ? 'high' : '';
    var html = '<div class="player-card' + (done ? ' finished' : '') + '">';
    html += '<div class="card-top">';
    html += '<input class="player-name-input" value="' + escHtml(p.name) + '" oninput="updateName(' + p.id + ',this.value)" placeholder="İsim">';
    html += '<button class="del-btn" onclick="removePlayer(' + p.id + ')"><i class="ti ti-trash"></i></button>';
    html += '</div>';
    html += '<span class="set-badge"><i class="ti ti-trophy" style="font-size:10px"></i> ' + p.sets + ' set</span>';
    html += '<div class="total-row"><span class="total-label">Toplam Puan</span><span class="total-score">' + tot.toLocaleString('tr-TR') + '</span></div>';
    html += '<div class="progress-wrap">';
    html += '<div class="progress-bg"><div class="progress-fill ' + fillCls + '" style="width:' + pct + '%"></div></div>';
    if (done) {
      html += '<span class="done-badge"><i class="ti ti-check" style="font-size:11px"></i> Hedefe ulaştı!</span>';
    } else {
      html += '<span class="need-label">Hedefe <strong>' + left.toLocaleString('tr-TR') + ' puan</strong> kaldı &nbsp;(' + pct + '%)</span>';
    }
    html += '</div>';
    html += '<div class="history-chips">' + (chips || '<span style="font-size:11px;color:var(--text-secondary)">Henüz puan yok</span>') + '</div>';
    html += '<div class="score-row">';
    html += '<input class="score-inp" type="number" id="inp-' + p.id + '" placeholder="Puan gir" onkeydown="if(event.key===\'Enter\')addScore(' + p.id + ')">';
    html += '<button class="add-score-btn" onclick="addScore(' + p.id + ')">Ekle</button>';
    html += '</div></div>';
    return html;
  }

  function render() {
    var grid = document.getElementById('players-grid');
    var empty = document.getElementById('empty');
    if (!players.length) { grid.innerHTML = ''; empty.style.display = 'block'; renderSetRow(); return; }
    empty.style.display = 'none';

    renderSetRow();
    updateInfoBar();

  function renderSetRow() {
    var row = document.getElementById('set-scores-row');
    if (!players.length) { row.innerHTML = '<span style="font-size:12px;color:var(--text-secondary)">Oyuncu yok</span>'; return; }
    var parts = [];
    for (var i = 0; i < players.length; i++) {
      var p = players[i];
      parts.push('<div class="set-player"><span class="set-name">' + escHtml(p.name) + '</span><span class="set-count">' + p.sets + '</span></div>');
      if (i < players.length - 1) parts.push('<span class="set-sep">—</span>');
    }
    row.innerHTML = parts.join('');
  }

  function addPlayer() {
    players.push({ id: nextId, name: 'Oyuncu ' + nextId, scores: [], sets: 0 });
    nextId++;
    render();
  }

  function removePlayer(id) {
    if (!confirm('Bu oyuncuyu silmek istiyor musun?')) return;
    players = players.filter(function(p) { return p.id !== id; });
    render();
  }

  function updateName(id, val) {
    var p = players.find(function(p) { return p.id === id; });
    if (p) { p.name = val; renderSetRow(); }
  }

  function addScore(id) {
    var inp = document.getElementById('inp-' + id);
    var val = parseInt(inp.value, 10);
    if (isNaN(val)) { showToast('Geçerli bir sayı gir!'); return; }
    var p = players.find(function(p) { return p.id === id; });
    if (!p) return;
    p.scores.push(val);
    inp.value = '';
    render();
    showToast(p.name + ': ' + (val > 0 ? '+' : '') + val + ' puan eklendi');
    setTimeout(function() {
      var ni = document.getElementById('inp-' + id);
      if (ni) ni.focus();
    }, 50);
    if (!roundModalOpen) checkForWinner();
  }

  function checkForWinner() {
    for (var i = 0; i < players.length; i++) {
      if (total(players[i]) >= TARGET) {
        var winner = players[i];
        winner.sets++;
        roundModalOpen = true;
        render();
        showRoundModal(winner);
        return;
      }
    }
  }

  function showRoundModal(winner) {
    document.getElementById('round-title').textContent = winner.name + ' seti kazandı! 🎉';
    var setLine = players.map(function(p) { return escHtml(p.name) + ': ' + p.sets + ' set'; }).join(' — ');
    var resetInfo = effectiveReset() ? 'Tüm puanlar sıfırlanacak.' : 'Puanlar korunacak.';
    document.getElementById('round-sub').innerHTML = setLine + '<br><br><em>' + resetInfo + '</em>';
    document.getElementById('round-reset-override').checked = false;
    document.getElementById('round-modal').classList.add('open');
  }

  function nextRound() {
    var override = document.getElementById('round-reset-override').checked;
    var shouldReset = effectiveReset();
    if (override) shouldReset = !shouldReset;
    if (shouldReset) {
      players.forEach(function(p) { p.scores = []; });
    }
    roundModalOpen = false;
    closeModal('round-modal');
    render();
    showToast('Yeni set başladı!');
  }

  function keepAndClose() {
    roundModalOpen = false;
    closeModal('round-modal');
    render();
  }

  function resetAllScores() {
    if (!confirm('Tüm puanlar sıfırlansın mı?')) return;
    players.forEach(function(p) { p.scores = []; });
    render();
    showToast('Tüm puanlar sıfırlandı');
  }

  function openSettingsModal() {
    document.getElementById('s-target').value = TARGET;
    document.getElementById('s-reset-all').checked = resetAllOnSet;
    document.getElementById('s-auto-mode').checked = autoResetMode;
    document.getElementById('settings-modal').classList.add('open');
  }

  function saveSettings() {
    var v = parseInt(document.getElementById('s-target').value, 10);
    if (!isNaN(v) && v > 0) TARGET = v;
    resetAllOnSet = document.getElementById('s-reset-all').checked;
    autoResetMode = document.getElementById('s-auto-mode').checked;
    closeModal('settings-modal');
    render();
    showToast('Ayarlar kaydedildi');
  }

  function openManualSetModal() {
    var rows = players.map(function(p) {
      return '<div class="modal-row"><label>' + escHtml(p.name) + '</label><input class="modal-input" type="number" id="ms-' + p.id + '" value="' + p.sets + '" min="0"></div>';
    }).join('');
    document.getElementById('set-manual-rows').innerHTML = rows;
    document.getElementById('set-modal').classList.add('open');
  }

  function saveManualSets() {
    players.forEach(function(p) {
      var inp = document.getElementById('ms-' + p.id);
      if (inp) {
        var v = parseInt(inp.value, 10);
        if (!isNaN(v) && v >= 0) p.sets = v;
      }
    });
    closeModal('set-modal');
    render();
    showToast('Set skoru güncellendi');
  }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2200);
  }

  document.addEventListener('click', function(e) {
    var overlays = document.querySelectorAll('.modal-overlay, .round-modal');
    for (var i = 0; i < overlays.length; i++) {
      if (e.target === overlays[i]) {
        overlays[i].classList.remove('open');
        if (overlays[i].id === 'round-modal') roundModalOpen = false;
      }
    }
  });

  render();

</script>
</body>
</html>
